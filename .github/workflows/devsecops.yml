name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # SAST — SonarCloud
  # ─────────────────────────────────────────────
  sast:
    name: SAST — SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ─────────────────────────────────────────────
  # SCA — OWASP Dependency-Check
  # ─────────────────────────────────────────────
  sca:
    name: SCA — OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: UniRide
          path: .
          format: HTML
          out: reports
          args: --enableRetired

      - name: Upload Dependency-Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports

  # ─────────────────────────────────────────────
  # DAST — OWASP ZAP (authenticated full scan)
  # ─────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore and build backend
        run: |
          dotnet restore backend/UniRide.Api.csproj
          dotnet build backend/UniRide.Api.csproj --no-restore --configuration Release

      - name: Start backend
        working-directory: backend
        env:
          ASPNETCORE_URLS: http://0.0.0.0:5007
          ASPNETCORE_ENVIRONMENT: Development
        run: dotnet run --project UniRide.Api.csproj --no-build --configuration Release &

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:5007/swagger/v1/swagger.json > /dev/null; do sleep 3; done'
          echo "Backend is up"

      - name: Get JWT token for ZAP
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:5007/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"universityEmail\":\"${{ secrets.ZAP_TEST_EMAIL }}\",\"password\":\"${{ secrets.ZAP_TEST_PASSWORD }}\",\"role\":\"passenger\"}")
          TOKEN=$(echo "$RESPONSE" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to get JWT. Response: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Download OpenAPI spec for ZAP
        run: |
          curl -s http://localhost:5007/swagger/v1/swagger.json \
            | sed 's|http://localhost:5007|http://host.docker.internal:5007|g' \
            > zap-openapi.json

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: 'zap-openapi.json'
          format: openapi
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          token: ${{ secrets.GITHUB_TOKEN }}
          allow_issue_writing: false
          fail_action: false
          cmd_options: '-z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement=Bearer ${{ steps.auth.outputs.token }}"'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_html.html
